<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="820" height="460" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="orkestra web UI layout: fixed left sidebar with navigation, a main area with page header, content, and a system overview panel">
  <!-- app window -->
  <rect x="8" y="8" width="804" height="444" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- sidebar (left rounded, right straight) -->
  <path d="M22 8 H204 V452 H22 A14 14 0 0 1 8 438 V22 A14 14 0 0 1 22 8 Z" fill="#161b22"/>
  <line x1="204" y1="8" x2="204" y2="452" stroke="#21262d" stroke-width="1.5"/>

  <!-- logo / wordmark -->
  <rect x="26" y="24" width="22" height="22" rx="6" fill="#7ee22a"/>
  <text x="56" y="40" font-size="15" font-weight="700" fill="#e6edf3">ork<tspan fill="#7ee22a">estra</tspan></text>

  <!-- active nav item: Dashboard -->
  <rect x="8" y="72" width="4" height="26" rx="2" fill="#7ee22a"/>
  <rect x="20" y="72" width="176" height="26" rx="6" fill="#1f2a17"/>
  <circle cx="38" cy="85" r="4" fill="#7ee22a"/>
  <text x="52" y="90" font-size="13" font-weight="600" fill="#7ee22a">Dashboard</text>

  <!-- other nav items -->
  <g font-size="13" fill="#8b949e">
    <circle cx="38" cy="119" r="4" fill="none" stroke="#8b949e" stroke-width="1.3"/>
    <text x="52" y="124">Servers</text>
    <circle cx="38" cy="153" r="4" fill="none" stroke="#8b949e" stroke-width="1.3"/>
    <text x="52" y="158">Stacks</text>
    <circle cx="38" cy="187" r="4" fill="none" stroke="#8b949e" stroke-width="1.3"/>
    <text x="52" y="192">Secrets</text>
    <circle cx="38" cy="221" r="4" fill="none" stroke="#8b949e" stroke-width="1.3"/>
    <text x="52" y="226">Users</text>
    <circle cx="38" cy="255" r="4" fill="none" stroke="#8b949e" stroke-width="1.3"/>
    <text x="52" y="260">Settings</text>
  </g>

  <!-- header bar -->
  <rect x="224" y="24" width="572" height="44" rx="8" fill="#161b22" stroke="#21262d"/>
  <text x="244" y="51" font-size="14" font-weight="600" fill="#e6edf3">Page Header</text>
  <rect x="596" y="34" width="132" height="24" rx="12" fill="#0d1117" stroke="#30363d"/>
  <circle cx="611" cy="46" r="5" fill="none" stroke="#8b949e" stroke-width="1.3"/>
  <line x1="615" y1="50" x2="619" y2="54" stroke="#8b949e" stroke-width="1.3"/>
  <text x="626" y="50" font-size="11" fill="#6e7681">Search…</text>
  <circle cx="756" cy="46" r="13" fill="#21262d" stroke="#30363d"/>
  <circle cx="756" cy="42" r="4" fill="#8b949e"/>
  <path d="M749 53 a7 7 0 0 1 14 0 Z" fill="#8b949e"/>

  <!-- content area -->
  <rect x="224" y="84" width="572" height="252" rx="8" fill="#161b22" stroke="#21262d"/>
  <text x="244" y="112" font-size="14" font-weight="600" fill="#e6edf3">Main content</text>
  <text x="244" y="130" font-size="12" fill="#8b949e">table / detail / editor</text>
  <!-- primary action button -->
  <rect x="676" y="96" width="104" height="28" rx="6" fill="#7ee22a"/>
  <text x="728" y="115" font-size="12" font-weight="600" fill="#0d1117" text-anchor="middle">+ New Stack</text>

  <!-- faux table -->
  <line x1="244" y1="150" x2="776" y2="150" stroke="#21262d"/>
  <g>
    <circle cx="252" cy="172" r="4" fill="#3fb950"/>
    <rect x="268" y="168" width="150" height="8" rx="4" fill="#30363d"/>
    <rect x="470" y="168" width="90" height="8" rx="4" fill="#21262d"/>
    <rect x="620" y="168" width="60" height="8" rx="4" fill="#21262d"/>
  </g>
  <line x1="244" y1="194" x2="776" y2="194" stroke="#21262d"/>
  <g>
    <circle cx="252" cy="216" r="4" fill="#3fb950"/>
    <rect x="268" y="212" width="130" height="8" rx="4" fill="#30363d"/>
    <rect x="470" y="212" width="110" height="8" rx="4" fill="#21262d"/>
    <rect x="620" y="212" width="60" height="8" rx="4" fill="#21262d"/>
  </g>
  <line x1="244" y1="238" x2="776" y2="238" stroke="#21262d"/>
  <g>
    <circle cx="252" cy="260" r="4" fill="none" stroke="#8b949e" stroke-width="1.3"/>
    <rect x="268" y="256" width="160" height="8" rx="4" fill="#30363d"/>
    <rect x="470" y="256" width="80" height="8" rx="4" fill="#21262d"/>
    <rect x="620" y="256" width="60" height="8" rx="4" fill="#21262d"/>
  </g>
  <line x1="244" y1="282" x2="776" y2="282" stroke="#21262d"/>
  <g>
    <circle cx="252" cy="304" r="4" fill="#f85149"/>
    <rect x="268" y="300" width="120" height="8" rx="4" fill="#30363d"/>
    <rect x="470" y="300" width="100" height="8" rx="4" fill="#21262d"/>
    <rect x="620" y="300" width="60" height="8" rx="4" fill="#21262d"/>
  </g>

  <!-- system overview / stats panel -->
  <rect x="224" y="352" width="572" height="84" rx="8" fill="#161b22" stroke="#21262d"/>
  <text x="244" y="374" font-size="12" font-weight="600" fill="#8b949e">System overview</text>
  <!-- CPU -->
  <text x="244" y="400" font-size="11" fill="#8b949e">CPU</text>
  <rect x="244" y="408" width="150" height="8" rx="4" fill="#21262d"/>
  <rect x="244" y="408" width="93" height="8" rx="4" fill="#7ee22a"/>
  <text x="404" y="416" font-size="11" fill="#e6edf3">62%</text>
  <!-- Memory -->
  <text x="450" y="400" font-size="11" fill="#8b949e">Memory</text>
  <rect x="450" y="408" width="150" height="8" rx="4" fill="#21262d"/>
  <rect x="450" y="408" width="63" height="8" rx="4" fill="#7ee22a"/>
  <text x="610" y="416" font-size="11" fill="#e6edf3">41%</text>
  <!-- Storage -->
  <text x="656" y="400" font-size="11" fill="#8b949e">Storage</text>
  <rect x="656" y="408" width="90" height="8" rx="4" fill="#21262d"/>
  <rect x="656" y="408" width="34" height="8" rx="4" fill="#7ee22a"/>
  <text x="754" y="416" font-size="11" fill="#e6edf3">38%</text>
</svg>
