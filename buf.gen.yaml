version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/heckertobias/orkestra/internal/shared/gen
plugins:
  # Go: protobuf + Connect
  - remote: buf.build/protocolbuffers/go
    out: internal/shared/gen
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: internal/shared/gen
    opt:
      - paths=source_relative
  # TypeScript: protobuf-es + Connect-es
  - remote: buf.build/bufbuild/es
    out: web/gen
    opt:
      - target=ts
  - remote: buf.build/connectrpc/es
    out: web/gen
    opt:
      - target=ts
