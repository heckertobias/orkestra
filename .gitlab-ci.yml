include:
  - project: egt/cicd-components
    ref: main
    file: /templates/go.yml

variables:
  GO_VERSION: "1.23"
  # Web UI build (runs before go build so web/dist is present for embedding)
  BEFORE_BUILD_SCRIPT: |
    cd web && npm ci && npm run build && cd ..

stages:
  - next-version
  - build
  - test
  - lint
  - release

# Override the build job to produce both binaries
build:
  extends: .go-build
  script:
    - make build
  artifacts:
    paths:
      - bin/

test:
  extends: .go-test
  script:
    - make test

lint:
  extends: .go-lint
  script:
    - make lint

# Integration tests run against a Docker-in-Docker service
test-integration:
  stage: test
  image: golang:1.23-alpine
  services:
    - docker:dind
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  script:
    - make test-integration
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
