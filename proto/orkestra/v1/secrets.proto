syntax = "proto3";

package orkestra.v1;

option go_package = "github.com/egt/orkestra/internal/shared/gen/orkestra/v1;orkestraV1";

service SecretService {
  rpc ListSecrets(ListSecretsRequest)     returns (ListSecretsResponse);
  rpc GetSecret(GetSecretRequest)         returns (SecretMeta);
  rpc CreateSecret(CreateSecretRequest)   returns (SecretMeta);
  rpc UpdateSecret(UpdateSecretRequest)   returns (SecretMeta);
  rpc DeleteSecret(DeleteSecretRequest)   returns (SecretEmpty);
  rpc RevealSecret(RevealSecretRequest)   returns (RevealSecretResponse); // requires re-auth
  rpc MigrateProvider(MigrateProviderRequest) returns (SecretMeta);
}

message SecretMeta {
  string id          = 1;
  string name        = 2;
  string description = 3;
  string provider    = 4; // builtin | openbao
  int32  version     = 5;
  int64  created_at  = 6;
  int64  updated_at  = 7;
  // OpenBao fields (only set when provider=openbao)
  string bao_mount   = 8;
  string bao_path    = 9;
  string bao_key     = 10;
  // bindings (read-only)
  int32  binding_count = 11;
}

message ListSecretsRequest  { string name_prefix = 1; }
message ListSecretsResponse { repeated SecretMeta secrets = 1; }
message GetSecretRequest    { string id = 1; }
message DeleteSecretRequest { string id = 1; }

message CreateSecretRequest {
  string description = 1;
  string name        = 2;
  string provider    = 3; // builtin | openbao
  // For builtin: include value_bytes
  bytes  value_bytes = 4;
  // For openbao: include path info
  string bao_mount   = 5;
  string bao_path    = 6;
  string bao_key     = 7;
}

message UpdateSecretRequest {
  string id          = 1;
  string description = 2;
  // For builtin: include new value
  bytes  value_bytes = 3;
  // For openbao: update path
  string bao_mount   = 4;
  string bao_path    = 5;
  string bao_key     = 6;
}

message RevealSecretRequest {
  string id              = 1;
  string reauth_password = 2; // current user's password (or use OIDC session)
}

message RevealSecretResponse {
  bytes value_bytes = 1;
  int32 version     = 2;
}

message MigrateProviderRequest {
  string id              = 1;
  string target_provider = 2; // "openbao"
  string bao_mount       = 3;
  string bao_path        = 4;
  string bao_key         = 5;
}

message SecretEmpty {}
