syntax = "proto3";

package orkestra.v1;

option go_package = "github.com/heckertobias/orkestra/internal/shared/gen/orkestra/v1;orkestraV1";

service AuthService {
  // Session auth
  rpc Login(LoginRequest)                 returns (LoginResponse);
  rpc Logout(AuthEmpty)                   returns (LogoutResponse);
  rpc GetCurrentUser(AuthEmpty)           returns (User);

  // User management (admin)
  rpc ListUsers(ListUsersRequest)         returns (ListUsersResponse);
  rpc CreateUser(CreateUserRequest)       returns (User);
  rpc UpdateUser(UpdateUserRequest)       returns (User);
  rpc DeleteUser(DeleteUserRequest)       returns (AuthEmpty);
  rpc ResetPassword(ResetPasswordRequest) returns (AuthEmpty);
  rpc SendPasswordLink(SendPasswordLinkRequest) returns (AuthEmpty);

  // Self-service profile management (authenticated user)
  rpc UpdateProfile(UpdateProfileRequest)                       returns (User);
  rpc RequestEmailChange(RequestEmailChangeRequest)             returns (AuthEmpty);
  rpc ConfirmEmailChange(ConfirmEmailChangeRequest)             returns (AuthEmpty);

  // Self-service password management (authenticated user)
  rpc ChangePassword(ChangePasswordRequest)                     returns (AuthEmpty);
  rpc RequestPasswordReset(RequestPasswordResetRequest)         returns (AuthEmpty);
  rpc ResetPasswordWithToken(ResetPasswordWithTokenRequest)     returns (AuthEmpty);

  // Role bindings (admin)
  rpc ListRoleBindings(ListRoleBindingsRequest) returns (ListRoleBindingsResponse);
  rpc AssignRole(AssignRoleRequest)             returns (RoleBinding);
  rpc RevokeRole(RevokeRoleRequest)             returns (AuthEmpty);

  // OIDC config (admin)
  rpc GetOIDCConfig(AuthEmpty)                  returns (OIDCConfig);
  rpc UpdateOIDCConfig(UpdateOIDCConfigRequest) returns (OIDCConfig);

  // Password policy (admin)
  rpc GetPasswordPolicy(AuthEmpty)                    returns (PasswordPolicy);
  rpc UpdatePasswordPolicy(PasswordPolicy)            returns (PasswordPolicy);

  // SMTP config (admin)
  rpc GetSMTPConfig(AuthEmpty)                  returns (SMTPConfig);
  rpc UpdateSMTPConfig(UpdateSMTPConfigRequest) returns (SMTPConfig);

  // Server config (admin)
  rpc GetServerConfig(AuthEmpty)                    returns (ServerConfig);
  rpc UpdateServerConfig(UpdateServerConfigRequest) returns (ServerConfig);

  // Enrollment tokens (admin/operator)
  rpc ListEnrollmentTokens(AuthEmpty)                      returns (ListEnrollmentTokensResponse);
  rpc CreateEnrollmentToken(CreateEnrollmentTokenRequest)  returns (EnrollmentToken);
  rpc RevokeEnrollmentToken(RevokeEnrollmentTokenRequest)  returns (AuthEmpty);

  // API keys (self-service for current user; admin can list all)
  rpc ListAPIKeys(ListAPIKeysRequest)   returns (ListAPIKeysResponse);
  rpc CreateAPIKey(CreateAPIKeyRequest) returns (APIKey);
  rpc RevokeAPIKey(RevokeAPIKeyRequest) returns (AuthEmpty);
}

message User {
  string id            = 1;
  string username      = 2;
  string display_name  = 3;
  bool   has_password  = 4; // false for OIDC-only users
  bool   has_oidc      = 5;
  bool   disabled      = 6;
  int64  created_at    = 7;
  int64  last_login_at = 8;
  repeated string roles    = 9;  // effective global role names (for display only)
  repeated RoleBinding bindings = 10; // full binding list for client-side RBAC gating
  bool   sso_only      = 11; // when true, only OIDC login is allowed (no local password)
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  User   user       = 1;
  // Session token is set as an httponly cookie by the server; not included here.
  string session_id = 2; // for API clients that can't use cookies
}

message LogoutResponse {
  // When the session was SSO-authenticated, the provider's end_session_endpoint URL
  // (with id_token_hint + post_logout_redirect_uri) so the client can offer a full
  // RP-initiated logout. Empty for local (password) sessions.
  string post_logout_url = 1;
}

message ListUsersRequest  { bool include_disabled = 1; }
message ListUsersResponse { repeated User users = 1; }
message DeleteUserRequest { string id = 1; }

message CreateUserRequest {
  string username     = 1; // must be a valid email address
  string display_name = 2;
  bool   sso_only     = 3; // when true, no invite email is sent — user logs in via SSO only
  // password field removed — users set their own password via invite link
}

message UpdateUserRequest {
  string id           = 1;
  string display_name = 2;
  bool   disabled     = 3;
  string username     = 4; // new email address (admin path; must be a valid email)
  bool   sso_only     = 5; // toggle OIDC-only auth for this user
}

message SendPasswordLinkRequest { string user_id = 1; }

message UpdateProfileRequest {
  string display_name = 1;
}

message RequestEmailChangeRequest {
  string new_email = 1;
}

message ConfirmEmailChangeRequest {
  string token = 1;
}

message ResetPasswordRequest {
  string user_id      = 1;
  string new_password = 2;
}

message ChangePasswordRequest {
  string current_password = 1;
  string new_password     = 2;
}

message RequestPasswordResetRequest {
  string email = 1;
}

message ResetPasswordWithTokenRequest {
  string token        = 1;
  string new_password = 2;
}

// PasswordPolicy defines rules for internal users only.
// min=0 means no minimum; max=0 means unlimited.
message PasswordPolicy {
  int32 min_length   = 1;
  int32 special_min  = 2;
  int32 special_max  = 3;
  int32 digit_min    = 4;
  int32 digit_max    = 5;
  int32 upper_min    = 6;
  int32 upper_max    = 7;
  int32 lower_min    = 8;
  int32 lower_max    = 9;
}

message SMTPConfig {
  bool   enabled      = 1;
  string host         = 2;
  int32  port         = 3;
  string username     = 4;
  // password not returned; write-only via UpdateSMTPConfig
  string from_address = 5;
  string public_url   = 6; // base URL for email links (e.g. https://orkestra.example.com)
  bool   starttls     = 7;
}

message UpdateSMTPConfigRequest {
  bool   enabled      = 1;
  string host         = 2;
  int32  port         = 3;
  string username     = 4;
  string password     = 5; // write-only; leave blank to keep existing
  string from_address = 6;
  string public_url   = 7;
  bool   starttls     = 8;
}

// ServerConfig holds deployment-wide settings set in the UI. public_url is the
// browser-facing base URL and, when set, overrides ORKESTRA_PUBLIC_URL for the
// OIDC redirect, email links, and the setup link.
message ServerConfig {
  string public_url = 1; // browser-facing base URL (e.g. https://orkestra.example.com); empty = use env/default
}

message UpdateServerConfigRequest {
  string public_url = 1;
}

message RoleBinding {
  string id        = 1;
  string user_id   = 2;
  string role      = 3; // admin | operator | viewer
  string server_id = 4; // optional scope
  string stack_id  = 5; // optional scope
  int64  created_at = 6;
}

message ListRoleBindingsRequest  { string user_id = 1; }
message ListRoleBindingsResponse { repeated RoleBinding bindings = 1; }

message AssignRoleRequest {
  string user_id   = 1;
  string role      = 2;
  string server_id = 3;
  string stack_id  = 4;
}

message RevokeRoleRequest { string binding_id = 1; }

message OIDCConfig {
  bool   enabled        = 1;
  string issuer_url     = 2;
  string client_id      = 3;
  // client_secret is write-only; not returned
  repeated string scopes = 4;
  // claim_mapping: group value → orkestra role (e.g. "ork-admins" → "admin")
  map<string, string> claim_mapping = 5;
  string groups_claim   = 6; // which token claim holds groups (default: "groups")
}

message UpdateOIDCConfigRequest {
  bool   enabled        = 1;
  string issuer_url     = 2;
  string client_id      = 3;
  string client_secret  = 4; // write-only
  repeated string scopes = 5;
  map<string, string> claim_mapping = 6;
  string groups_claim   = 7;
}

message EnrollmentToken {
  string id          = 1;
  string description = 2;
  int32  ttl_seconds = 3;
  int32  max_uses    = 4;
  int32  used_count  = 5;
  int64  expires_at  = 6;
  int64  created_at  = 7;
  bool   revoked     = 8;
  string raw_token   = 9; // only set on create response (shown once)
}

message ListEnrollmentTokensResponse { repeated EnrollmentToken tokens = 1; }

message CreateEnrollmentTokenRequest {
  string description = 1;
  int32  ttl_seconds = 2;
  int32  max_uses    = 3;
}

message RevokeEnrollmentTokenRequest { string id = 1; }

message APIKey {
  string id           = 1;
  string user_id      = 2;
  string name         = 3;
  // raw_key only set on create response (shown once)
  string raw_key      = 4;
  int64  created_at   = 5;
  int64  last_used_at = 6;
  int64  expires_at   = 7;
  bool   revoked      = 8;
}

message ListAPIKeysRequest  { string user_id = 1; } // empty = current user
message ListAPIKeysResponse { repeated APIKey keys = 1; }

message CreateAPIKeyRequest {
  string name       = 1;
  int64  expires_at = 2; // 0 = never expires
}

message RevokeAPIKeyRequest { string id = 1; }

message AuthEmpty {}
