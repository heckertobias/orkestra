name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.71.0
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

      - name: Generate protobuf
        run: make proto

      - name: Generate sqlc
        run: make sqlc

      - name: go vet
        run: go vet -tags dev ./...

      - name: Test
        run: go test -tags dev ./...

      - name: Build
        run: make build-dev

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.71.0
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Generate (required before lint)
        run: make proto && make sqlc

      - name: golangci-lint
        run: golangci-lint run --build-tags dev ./...

      - name: buf lint
        run: buf lint

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    services:
      docker:
        image: docker:dind
        options: --privileged
    env:
      DOCKER_HOST: tcp://localhost:2376
      DOCKER_TLS_CERTDIR: ""
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.71.0
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

      - name: Generate
        run: make proto && make sqlc

      - name: Integration Tests
        run: go test -tags "dev integration" -timeout 5m ./...
