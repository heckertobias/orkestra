name: CI

on:
  push:
    branches: ["main"]
  pull_request:

# One in-flight run per ref: pushing a new commit to a PR cancels the previous,
# still-running CI for that PR instead of piling up parallel runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: Install tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.71.0
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

      - name: Generate protobuf
        run: make proto

      - name: Generate sqlc
        run: make sqlc

      - name: go vet
        run: go vet -tags dev ./...

      - name: Test
        run: go test -tags dev ./...

      - name: Build
        run: make build-dev

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: Install tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.71.0
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Generate (required before lint)
        run: make proto && make sqlc

      - name: golangci-lint
        run: golangci-lint run --build-tags dev ./...

      - name: buf lint
        run: buf lint

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # tsc + vite build. The app talks to the API over fetch, so web/gen
      # (generated Connect clients) is not needed for the build.
      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orkestra
          POSTGRES_USER: orkestra
          POSTGRES_PASSWORD: orkestra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orkestra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ORKESTRA_TEST_DATABASE_URL: postgres://orkestra:orkestra@localhost:5432/orkestra?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: Install tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.71.0
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

      - name: Generate
        run: make proto && make sqlc

      - name: Integration Tests
        run: go test -tags "dev integration" -timeout 5m ./...

  integration-converge:
    name: Integration Tests (Docker converge)
    runs-on: ubuntu-latest
    # main-only: exercises the converge engine against the runner's Docker daemon; heavier than the
    # Postgres job (image pulls), so it does not run on every PR.
    if: github.ref == 'refs/heads/main'
    env:
      ORKESTRA_TEST_DOCKER: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: Install tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.71.0
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

      - name: Generate
        run: make proto && make sqlc

      - name: Converge E2E
        run: go test -tags "dev integration" -run TestConvergeDeploysContainer -timeout 10m ./internal/e2e/...
