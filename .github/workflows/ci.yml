name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Install tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@latest
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Generate protobuf
        run: make proto

      - name: Generate sqlc
        run: make sqlc

      - name: go vet
        run: go vet ./...

      - name: Test
        run: make test

      - name: Build
        run: make build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Install tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@latest
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Generate (required before lint)
        run: make proto && make sqlc

      - name: golangci-lint
        run: golangci-lint run ./...

      - name: buf lint
        run: buf lint

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    services:
      docker:
        image: docker:dind
        options: --privileged
    env:
      DOCKER_HOST: tcp://localhost:2376
      DOCKER_TLS_CERTDIR: ""
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Install tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@latest
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Generate
        run: make proto && make sqlc

      - name: Integration Tests
        run: make test-integration
