version: 2

project_name: orkestra

before:
  # Order matters: codegen first (Go stubs in internal/shared/gen, TS clients in
  # web/gen), then the web build (embedded via go:embed), before goreleaser builds
  # the Go binaries. Any `go` command must run after `make proto`/`make sqlc`, or
  # it fails resolving the generated packages.
  hooks:
    - make proto
    - make sqlc
    - npm --prefix web ci
    - npm --prefix web run build

builds:
  - id: orkestra-master
    binary: orkestra-master
    main: ./cmd/orkestra-master
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/heckertobias/orkestra/internal/shared/version.Version={{.Version}}
      - -X github.com/heckertobias/orkestra/internal/shared/version.Commit={{.Commit}}
      - -X github.com/heckertobias/orkestra/internal/shared/version.BuildDate={{.Date}}

  - id: orkestra-agent
    binary: orkestra-agent
    main: ./cmd/orkestra-agent
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/heckertobias/orkestra/internal/shared/version.Version={{.Version}}
      - -X github.com/heckertobias/orkestra/internal/shared/version.Commit={{.Commit}}
      - -X github.com/heckertobias/orkestra/internal/shared/version.BuildDate={{.Date}}

archives:
  - id: master-archive
    ids: [orkestra-master]
    name_template: "orkestra-master_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - deploy/systemd/orkestra-master.service
      - deploy/docker/compose.yaml
      - deploy/docker/Dockerfile.master
      - CHANGELOG.md

  - id: agent-archive
    ids: [orkestra-agent]
    name_template: "orkestra-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - deploy/systemd/orkestra-agent.service
      - deploy/install-agent.sh
      - CHANGELOG.md

nfpms:
  - id: orkestra-master-pkg
    package_name: orkestra-master
    ids: [orkestra-master]
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: orkestra
    homepage: https://github.com/heckertobias/orkestra
    maintainer: Tobias Hecker <heckertobias@googlemail.com>
    description: |
      orkestra Master — control plane for centrally managed, self-healing
      Docker Compose stacks across Linux servers.
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    contents:
      - src: deploy/systemd/orkestra-master.service
        dst: /lib/systemd/system/orkestra-master.service
      - src: deploy/packaging/master/env
        dst: /etc/orkestra/master/env
        type: "config|noreplace"
        file_info:
          mode: 0640
    scripts:
      postinstall: deploy/packaging/master/postinstall.sh
      preremove: deploy/packaging/master/preremove.sh
      postremove: deploy/packaging/master/postremove.sh

  - id: orkestra-agent-pkg
    package_name: orkestra-agent
    ids: [orkestra-agent]
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: orkestra
    homepage: https://github.com/heckertobias/orkestra
    maintainer: Tobias Hecker <heckertobias@googlemail.com>
    description: |
      orkestra Agent — reconciles Docker Compose stacks on a host toward the
      Master's desired state over an outbound mTLS gRPC stream.
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    recommends:
      - docker.io
    contents:
      - src: deploy/systemd/orkestra-agent.service
        dst: /lib/systemd/system/orkestra-agent.service
      - src: deploy/packaging/agent/env
        dst: /etc/orkestra/agent/env
        type: "config|noreplace"
        file_info:
          mode: 0600
    scripts:
      postinstall: deploy/packaging/agent/postinstall.sh
      preremove: deploy/packaging/agent/preremove.sh
      postremove: deploy/packaging/agent/postremove.sh

dockers:
  - id: master-amd64
    ids: [orkestra-master]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/heckertobias/orkestra-master:{{ .Version }}-amd64"
      - "ghcr.io/heckertobias/orkestra-master:latest-amd64"
    dockerfile: deploy/docker/Dockerfile.master
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=orkestra-master"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.source=https://github.com/heckertobias/orkestra"

  - id: master-arm64
    ids: [orkestra-master]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/heckertobias/orkestra-master:{{ .Version }}-arm64"
      - "ghcr.io/heckertobias/orkestra-master:latest-arm64"
    dockerfile: deploy/docker/Dockerfile.master
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=orkestra-master"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.source=https://github.com/heckertobias/orkestra"

  - id: agent-amd64
    ids: [orkestra-agent]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/heckertobias/orkestra-agent:{{ .Version }}-amd64"
      - "ghcr.io/heckertobias/orkestra-agent:latest-amd64"
    dockerfile: deploy/docker/Dockerfile.agent
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=orkestra-agent"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.source=https://github.com/heckertobias/orkestra"

  - id: agent-arm64
    ids: [orkestra-agent]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/heckertobias/orkestra-agent:{{ .Version }}-arm64"
      - "ghcr.io/heckertobias/orkestra-agent:latest-arm64"
    dockerfile: deploy/docker/Dockerfile.agent
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=orkestra-agent"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.source=https://github.com/heckertobias/orkestra"

docker_manifests:
  - name_template: "ghcr.io/heckertobias/orkestra-master:{{ .Version }}"
    image_templates:
      - "ghcr.io/heckertobias/orkestra-master:{{ .Version }}-amd64"
      - "ghcr.io/heckertobias/orkestra-master:{{ .Version }}-arm64"
  - name_template: "ghcr.io/heckertobias/orkestra-master:latest"
    image_templates:
      - "ghcr.io/heckertobias/orkestra-master:latest-amd64"
      - "ghcr.io/heckertobias/orkestra-master:latest-arm64"
  - name_template: "ghcr.io/heckertobias/orkestra-agent:{{ .Version }}"
    image_templates:
      - "ghcr.io/heckertobias/orkestra-agent:{{ .Version }}-amd64"
      - "ghcr.io/heckertobias/orkestra-agent:{{ .Version }}-arm64"
  - name_template: "ghcr.io/heckertobias/orkestra-agent:latest"
    image_templates:
      - "ghcr.io/heckertobias/orkestra-agent:latest-amd64"
      - "ghcr.io/heckertobias/orkestra-agent:latest-arm64"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: heckertobias
    name: orkestra
  name_template: "v{{ .Version }}"
  header: |
    ## orkestra {{ .Tag }}

    See [CHANGELOG.md](CHANGELOG.md) for details.
