version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/master/store/queries"
    schema: "internal/master/store/migrations"
    gen:
      go:
        package: "store"
        out: "internal/master/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
